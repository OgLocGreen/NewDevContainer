services:
  service_new_dev_container:
    build:
      context: .
    image: new_dev_container:latest
    hostname: new_dev_container
    network_mode: bridge
    volumes:
      - ${localWorkspaceFolder:-..}:/app/new_dev_container
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ~/.gitconfig:/etc/gitconfig:ro
      - ~/.ssh:/root/.ssh:ro
    environment:
      - DISPLAY=${DISPLAY:-}
    ports:
      - "4010:4010"
    stdin_open: true
    tty: true
    shm_size: '32gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
